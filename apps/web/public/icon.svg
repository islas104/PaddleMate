<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ball -->
  <circle cx="100" cy="28" r="16" fill="#c8e64a" stroke="#1d1d1b" stroke-width="2.5"/>
  <path d="M86,22 Q100,30 114,22" fill="none" stroke="#1d1d1b" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M85,34 Q100,26 115,34" fill="none" stroke="#1d1d1b" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Left racket (tilted left, handle bottom-right) -->
  <g transform="translate(72,185) rotate(-40)">
    <!-- Handle -->
    <rect x="-8" y="0" width="16" height="55" rx="5" fill="#1d1d1b"/>
    <rect x="-8" y="8" width="16" height="5" rx="2" fill="#444"/>
    <rect x="-8" y="18" width="16" height="5" rx="2" fill="#444"/>
    <rect x="-8" y="28" width="16" height="5" rx="2" fill="#444"/>
    <rect x="-8" y="38" width="16" height="5" rx="2" fill="#444"/>
    <!-- Neck -->
    <rect x="-5" y="-10" width="10" height="14" rx="3" fill="#1d1d1b"/>
    <!-- Head -->
    <ellipse cx="0" cy="-48" rx="28" ry="38" fill="#8dc63f" stroke="#1d1d1b" stroke-width="3"/>
    <!-- Diagonal stripe -->
    <clipPath id="leftHead">
      <ellipse cx="0" cy="-48" rx="28" ry="38"/>
    </clipPath>
    <rect x="-36" y="-72" width="20" height="90" rx="2" fill="#1d1d1b" opacity="0.75" clip-path="url(#leftHead)" transform="rotate(12,0,-48)"/>
    <!-- Holes -->
    <g clip-path="url(#leftHead)" fill="white" opacity="0.7">
      <circle cx="-14" cy="-65" r="2.5"/>
      <circle cx="-4" cy="-65" r="2.5"/>
      <circle cx="6" cy="-65" r="2.5"/>
      <circle cx="16" cy="-65" r="2.5"/>
      <circle cx="-18" cy="-54" r="2.5"/>
      <circle cx="-8" cy="-54" r="2.5"/>
      <circle cx="2" cy="-54" r="2.5"/>
      <circle cx="12" cy="-54" r="2.5"/>
      <circle cx="20" cy="-54" r="2.5"/>
      <circle cx="-14" cy="-43" r="2.5"/>
      <circle cx="-4" cy="-43" r="2.5"/>
      <circle cx="6" cy="-43" r="2.5"/>
      <circle cx="16" cy="-43" r="2.5"/>
      <circle cx="-16" cy="-32" r="2.5"/>
      <circle cx="-6" cy="-32" r="2.5"/>
      <circle cx="4" cy="-32" r="2.5"/>
      <circle cx="14" cy="-32" r="2.5"/>
      <circle cx="-10" cy="-21" r="2.5"/>
      <circle cx="0" cy="-21" r="2.5"/>
      <circle cx="10" cy="-21" r="2.5"/>
    </g>
  </g>

  <!-- Right racket (tilted right, handle bottom-left) -->
  <g transform="translate(128,185) rotate(40)">
    <!-- Handle -->
    <rect x="-8" y="0" width="16" height="55" rx="5" fill="#1d1d1b"/>
    <rect x="-8" y="8" width="16" height="5" rx="2" fill="#444"/>
    <rect x="-8" y="18" width="16" height="5" rx="2" fill="#444"/>
    <rect x="-8" y="28" width="16" height="5" rx="2" fill="#444"/>
    <rect x="-8" y="38" width="16" height="5" rx="2" fill="#444"/>
    <!-- Neck -->
    <rect x="-5" y="-10" width="10" height="14" rx="3" fill="#1d1d1b"/>
    <!-- Head -->
    <ellipse cx="0" cy="-48" rx="28" ry="38" fill="#8dc63f" stroke="#1d1d1b" stroke-width="3"/>
    <!-- Diagonal stripe -->
    <clipPath id="rightHead">
      <ellipse cx="0" cy="-48" rx="28" ry="38"/>
    </clipPath>
    <rect x="16" y="-72" width="20" height="90" rx="2" fill="#1d1d1b" opacity="0.75" clip-path="url(#rightHead)" transform="rotate(-12,0,-48)"/>
    <!-- Holes -->
    <g clip-path="url(#rightHead)" fill="white" opacity="0.7">
      <circle cx="-16" cy="-65" r="2.5"/>
      <circle cx="-6" cy="-65" r="2.5"/>
      <circle cx="4" cy="-65" r="2.5"/>
      <circle cx="14" cy="-65" r="2.5"/>
      <circle cx="-20" cy="-54" r="2.5"/>
      <circle cx="-10" cy="-54" r="2.5"/>
      <circle cx="0" cy="-54" r="2.5"/>
      <circle cx="10" cy="-54" r="2.5"/>
      <circle cx="18" cy="-54" r="2.5"/>
      <circle cx="-14" cy="-43" r="2.5"/>
      <circle cx="-4" cy="-43" r="2.5"/>
      <circle cx="6" cy="-43" r="2.5"/>
      <circle cx="16" cy="-43" r="2.5"/>
      <circle cx="-16" cy="-32" r="2.5"/>
      <circle cx="-6" cy="-32" r="2.5"/>
      <circle cx="4" cy="-32" r="2.5"/>
      <circle cx="14" cy="-32" r="2.5"/>
      <circle cx="-10" cy="-21" r="2.5"/>
      <circle cx="0" cy="-21" r="2.5"/>
      <circle cx="10" cy="-21" r="2.5"/>
    </g>
  </g>
</svg>
